name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --filename="*.py,*.pyw" \
            --select=E9,F63,F7,F82 \
            --max-line-length=120 \
            --exclude=.git,.github,.claude \
            --count \
            --show-source \
            --statistics
